<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>나만의 NE Times — 제작 POC</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --paper:#F7F3EA;
    --panel:#FFFFFF;
    --line:#E3DCC9;
    --ink:#1A1A1A;
    --ink-soft:#5B5548;
    --red:#D6402A;
    --navy:#1F3864;
    --gold:#B6862C;
    --l1:#4C9F70; --l2:#C98A2C; --l3:#C4514B;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Segoe UI",sans-serif;}
  .serif{font-family:Georgia,"Noto Serif KR",serif;}

  /* ---------- top bar ---------- */
  .topbar{position:sticky;top:0;z-index:40;background:var(--ink);color:#fff;
    padding:14px 22px;display:flex;align-items:center;gap:14px;border-bottom:3px solid var(--red);}
  .topbar .brand{display:flex;align-items:baseline;gap:8px;}
  .topbar .brand b{color:var(--red);font-size:20px;letter-spacing:.5px;}
  .topbar .brand span{font-size:20px;font-weight:400;}
  .topbar .tag{font-size:11px;color:#C9C4B4;border:1px solid #444;padding:2px 8px;border-radius:20px;margin-left:4px;}
  .topbar .crumbs{margin-left:auto;display:flex;gap:4px;flex-wrap:wrap;font-size:11.5px;color:#B9B4A4;}
  .topbar .crumbs .c{padding:3px 8px;border-radius:12px;cursor:default;}
  .topbar .crumbs .c.active{background:var(--red);color:#fff;}
  .topbar .crumbs .c.done{cursor:pointer;color:#fff;}
  .topbar .crumbs .c.done:hover{text-decoration:underline;}

  /* ---------- layout ---------- */
  .wrap{display:flex;max-width:1180px;margin:0 auto;align-items:flex-start;}
  .stepnav{width:210px;flex:none;padding:26px 14px 26px 22px;position:sticky;top:58px;}
  .stepnav .item{display:flex;gap:10px;padding:10px 8px;border-radius:10px;margin-bottom:2px;}
  .stepnav .item .num{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex:none;
    color:var(--ink-soft);background:var(--panel);}
  .stepnav .item.active .num{background:var(--red);border-color:var(--red);color:#fff;}
  .stepnav .item.done .num{background:var(--navy);border-color:var(--navy);color:#fff;}
  .stepnav .item .lbl{font-size:13px;line-height:1.35;padding-top:2px;color:var(--ink-soft);}
  .stepnav .item.active .lbl{color:var(--ink);font-weight:700;}
  .stepnav .rule{width:1px;height:16px;background:var(--line);margin-left:19px;}

  .panel{flex:1;padding:26px 26px 100px 24px;min-width:0;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:24px;margin-bottom:16px;}
  .eyebrow{font-size:11px;letter-spacing:1.5px;color:var(--red);font-weight:700;text-transform:uppercase;margin-bottom:6px;}

  /* ---------- step: academy ---------- */
  .toggle-row{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:700;cursor:pointer;}
  .toggle-row input{width:18px;height:18px;accent-color:var(--red);}
  .academy-fields{margin-top:18px;display:flex;flex-direction:column;gap:12px;transition:.15s;}
  .field-row{display:flex;flex-direction:column;gap:5px;}
  .field-row label{font-size:12px;color:var(--ink-soft);font-weight:700;}
  .field-row input[type=text]{border:1.5px solid var(--line);border-radius:8px;padding:9px 12px;
    font-size:13.5px;font-family:inherit;background:#fff;color:var(--ink);}
  .field-row input[type=text]:focus{outline:none;border-color:var(--red);}
  .academy-preview{display:flex;align-items:center;gap:12px;background:#fff;border:1.5px solid var(--line);
    border-left:4px solid var(--red);border-radius:8px;padding:12px 16px;max-width:360px;}
  .academy-preview .ap-icon{font-size:22px;flex:none;}
  .academy-preview .ap-name{font-weight:700;font-size:13.5px;}
  .academy-preview .ap-course{font-size:11px;color:var(--ink-soft);margin-top:2px;}
  h1.step-title{font-size:24px;margin:0 0 4px;}
  p.step-sub{color:var(--ink-soft);font-size:13.5px;margin:0 0 20px;line-height:1.6;}

  /* ---------- step1 media ---------- */
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .media-card{border:2px solid var(--line);border-radius:12px;padding:16px 14px;text-align:center;cursor:pointer;
    background:#fff;transition:.15s;position:relative;}
  .media-card:hover{border-color:#C9BFA0;}
  .media-card.selected{border-color:var(--red);background:#FBEEEA;}
  .media-card.disabled{opacity:.42;cursor:not-allowed;}
  .media-card .mlogo{font-family:Georgia,serif;font-weight:800;font-size:20px;margin-bottom:6px;}
  .media-card .msub{font-size:11px;color:var(--ink-soft);}
  .media-card .soon{position:absolute;top:8px;right:8px;font-size:9.5px;background:#EFE9D8;color:#8a8266;
    padding:2px 6px;border-radius:8px;}

  /* ---------- step2 templates ---------- */
  .grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
  .tpl-card{border:2px solid var(--line);border-radius:12px;padding:10px;text-align:center;cursor:pointer;background:#fff;position:relative;}
  .tpl-card:hover{border-color:#C9BFA0;}
  .tpl-card.selected{border-color:var(--red);}
  .tpl-card svg{width:100%;height:auto;border-radius:4px;display:block;}
  .tpl-card .tname{font-size:12.5px;font-weight:700;margin-top:8px;}
  .tpl-card .tdesc{font-size:10.5px;color:var(--ink-soft);margin-top:2px;}
  .tpl-card .rec{position:absolute;top:6px;left:6px;background:var(--navy);color:#fff;font-size:9px;
    padding:2px 6px;border-radius:8px;}

  /* ---------- article cards ---------- */
  .article-card{border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:12px;background:#fff;position:relative;}
  .article-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
  .sec-badge{font-size:10.5px;color:#fff;padding:3px 9px;border-radius:6px;font-weight:700;}
  .lvl-badge{font-size:10px;color:#fff;padding:2px 7px;border-radius:6px;font-weight:700;}
  .article-title{font-family:Georgia,serif;font-weight:700;font-size:17px;margin:2px 0 6px;}
  .article-body p{font-size:13px;line-height:1.7;color:#333;margin:0 0 8px;}
  .imgrow{display:flex;gap:8px;margin:10px 0;}
  .imgph{flex:1;height:128px;border-radius:8px;position:relative;overflow:hidden;
    display:flex;align-items:flex-end;padding:6px;color:#fff;font-size:9px;
    background-size:cover;background-position:center;}
  .imgph.imgph-real::after{content:"";position:absolute;inset:0;
    background:linear-gradient(0deg,rgba(0,0,0,.55) 0%,rgba(0,0,0,0) 55%);pointer-events:none;}
  .imgph .cap{background:rgba(0,0,0,.4);padding:2px 5px;border-radius:4px;position:relative;z-index:1;}
  .imgph > svg{position:absolute;top:8px;left:8px;opacity:.9;z-index:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5));}
  .page-qr{position:absolute;top:20px;right:24px;background:#fff;border:1px solid #DCE9F2;border-radius:8px;
    padding:4px;box-shadow:0 2px 6px rgba(0,0,0,.12);z-index:3;}
  .vocabrow{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .vchip{font-size:10.5px;background:#F3EFE3;border:1px solid var(--line);padding:3px 8px;border-radius:20px;color:var(--ink-soft);}

  /* select checkbox card */
  .pick-card{border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px;
    display:flex;gap:12px;align-items:flex-start;cursor:pointer;background:#fff;}
  .pick-card.checked{border-color:var(--red);background:#FBEEEA;}
  .pick-card input{margin-top:3px;}
  .pick-card .t{font-weight:700;font-size:14px;font-family:Georgia,serif;}
  .pick-card .s{font-size:12px;color:var(--ink-soft);margin-top:2px;}

  /* workbook option step */
  .wb-article{border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:14px;background:#fff;}
  .wb-article h3{margin:0 0 10px;font-size:15px;font-family:Georgia,serif;}
  .badge-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
  .badge{font-size:10.5px;padding:3px 9px;border-radius:20px;font-weight:700;}
  .badge.existing{background:#E7EFE7;color:#3C7A44;border:1px solid #BFDCC0;}
  .badge.gen{background:#EFE6F5;color:#6A4C93;border:1px solid #D9C6EA;}
  .mode-toggle{display:flex;gap:8px;margin-top:20px;padding-top:16px;border-top:1px dashed var(--line);}
  .mode-opt{flex:1;border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;cursor:pointer;background:#fff;}
  .mode-opt.selected{border-color:var(--navy);background:#EEF1F7;}
  .mode-opt .t{font-weight:700;font-size:13px;}
  .mode-opt .s{font-size:11.5px;color:var(--ink-soft);margin-top:3px;line-height:1.5;}

  /* ---------- preview book ---------- */
  .book{max-width:640px;margin:0 auto;}
  .page{background:#fff;border:1px solid #DED6C0;box-shadow:0 10px 24px rgba(0,0,0,.08);border-radius:4px;
    padding:26px 30px;margin-bottom:26px;position:relative;}
  .page::before{content:attr(data-pg);position:absolute;bottom:10px;right:16px;font-size:10px;color:#B7AF98;}
  .cover-page{padding:0;overflow:hidden;}
  .cover-page svg{width:100%;display:block;}
  .page .kicker{font-size:10.5px;color:var(--ink-soft);letter-spacing:.6px;margin-bottom:4px;}
  .page h2.ptitle{font-family:Georgia,serif;font-size:21px;margin:0 0 10px;}
  .page-split{display:flex;padding:0;overflow:hidden;align-items:stretch;}
  .page-split .split-img{flex:0 0 38%;background-size:cover;background-position:center;position:relative;min-height:100%;}
  .page-split .split-img::after{content:"";position:absolute;inset:0;
    background:linear-gradient(90deg,rgba(0,0,0,0) 70%,rgba(0,0,0,.06) 100%);}
  .page-split .split-cap{position:absolute;left:10px;bottom:10px;font-size:9px;color:#fff;
    background:rgba(0,0,0,.4);padding:2px 6px;border-radius:4px;z-index:1;}
  .page-split .split-img > svg{position:absolute;top:10px;left:10px;opacity:.9;z-index:1;
    filter:drop-shadow(0 1px 2px rgba(0,0,0,.5));}
  .page-split .split-body{flex:1;padding:26px 30px 26px 24px;min-width:0;}
  .page-split .split-body .ptext p{font-size:12.5px;}
  .page-split .split-body .vocabrow{margin-top:10px;}
  .page .ptext p{font-size:13.5px;line-height:1.75;color:#2A2A2A;margin:0 0 10px;}
  .wb-page{background:#FFFDF7;}
  .wb-body{margin-top:16px;}
  .wb-section{border:1px solid #E7E1CF;border-radius:10px;background:#FFFFFF;padding:15px 17px;margin-bottom:16px;}
  .wb-section:last-child{margin-bottom:0;}
  .wb-section h4{margin:0 0 11px;font-size:12.5px;font-family:Georgia,serif;color:var(--navy);
    padding-bottom:9px;border-bottom:1px solid #EEE9DA;}
  .wtag{font-size:9.5px;padding:2px 7px;border-radius:8px;margin-left:6px;font-weight:700;vertical-align:middle;}
  .wtag.existing{background:#E7EFE7;color:#3C7A44;}
  .wtag.gen{background:#EFE6F5;color:#6A4C93;}
  .vocab-table{width:100%;border-collapse:collapse;font-size:12.5px;}
  .vocab-table td{border:1px solid #E7E1CF;padding:7.5px 10px;}
  .vocab-table tr:nth-child(even){background:#FBF8F0;}
  .qlist .qitem{padding:9px 0;border-bottom:1px dashed #E2DCC8;}
  .qlist .qitem:first-child{padding-top:0;}
  .qlist .qitem:last-child{border-bottom:none;padding-bottom:0;}
  .mcq{font-size:12.5px;}
  .mcq .q{font-weight:700;margin-bottom:5px;}
  .mcq .opts{color:#444;padding-left:12px;line-height:1.7;}
  .tfrow,.matchrow{font-size:12.5px;}

  /* footer nav */
  .stepfooter{position:sticky;bottom:0;background:linear-gradient(0deg,var(--paper) 60%,rgba(247,243,234,0));
    padding:16px 24px 22px;display:flex;justify-content:space-between;max-width:1180px;margin:0 auto;}
  .stepfooter .side{width:210px;flex:none;}
  .btn{border:none;border-radius:9px;padding:11px 22px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit;}
  .btn.primary{background:var(--red);color:#fff;}
  .btn.primary:disabled{background:#DCCFC5;cursor:not-allowed;}
  .btn.ghost{background:transparent;color:var(--ink-soft);border:1.5px solid var(--line);}
  .cta-row{display:flex;gap:14px;margin:26px auto 0;max-width:640px;}
  .cta-btn.cta-extra{background:#8A6D2F;}
  .cta-btn.cta-extra:hover{background:#9E7E38;}
  .cta-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;
    padding:18px 16px;border-radius:12px;border:none;font-size:14px;font-weight:700;
    font-family:inherit;color:#fff;cursor:pointer;transition:.15s;}
  .cta-btn .cta-icon{font-size:22px;}
  .cta-btn.cta-print{background:var(--navy);}
  .cta-btn.cta-print:hover{background:#28477F;}
  .cta-btn.cta-pdf{background:#1D7770;}
  .cta-btn.cta-pdf:hover{background:#238B82;}
  .cta-btn.done{background:#3C7A44 !important;}

  @media(max-width:900px){
    .wrap{flex-direction:column;}
    .stepnav{position:static;width:100%;display:flex;overflow-x:auto;gap:4px;padding:14px 16px;}
    .stepnav .rule{display:none;}
    .stepnav .item{flex:none;}
    .grid4{grid-template-columns:repeat(2,1fr);}
    .grid5{grid-template-columns:repeat(2,1fr);}
    .stepfooter{flex-direction:column;gap:10px;}
    .stepfooter .side{width:auto;}
  }
</style>
</head>

/* ============================= HELPERS ============================= */
function wrapAndTruncate(text, maxChars, maxLines, forceEllipsis){
  const words = String(text||'').trim().split(/\s+/).filter(Boolean);
  const lines = [];
  let cur = '';
  let wordIdx = 0;
  while(wordIdx < words.length && lines.length < maxLines){
    const w = words[wordIdx];
    const test = cur ? cur + ' ' + w : w;
    if(test.length > maxChars && cur){
      lines.push(cur);
      cur = '';
    } else {
      cur = test;
      wordIdx++;
    }
  }
  if(cur && lines.length < maxLines){ lines.push(cur); }
  const truncated = wordIdx < words.length;
  if(lines.length===0) lines.push('');
  if(truncated || forceEllipsis){
    let last = lines[lines.length-1];
    if(!last.endsWith('...')){
      if(last.length > maxChars-3) last = last.slice(0, Math.max(0,maxChars-3)).trim();
      last = last + '...';
    }
    lines[lines.length-1] = last;
  }
  return lines;
}

/* ============================= RENDER: NAV ============================= */
function renderNav(){
  const nav = document.getElementById('stepnav');
  nav.innerHTML = STEPS.map((s,i)=>{
    const n=i+1;
    const cls = n===state.step ? 'active' : (n<state.step ? 'done':'');
    return `<div class="item ${cls}" data-step="${n}" style="cursor:${n<=state.maxStep?'pointer':'default'}">
      <div class="num">${n<state.step?'✓':n}</div><div class="lbl">${s}</div></div>`;
  }).join('<div class="rule"></div>');
  nav.querySelectorAll('.item').forEach(el=>{
    el.addEventListener('click',()=>{
      const n=parseInt(el.dataset.step);
      if(n<=state.maxStep){ state.step=n; renderAll(); }
    });
  });

  const crumbs = document.getElementById('crumbs');
  crumbs.innerHTML = STEPS.map((s,i)=>{
    const n=i+1;
    const cls = n===state.step?'active':(n<state.maxStep?'done':'');
    return `<span class="c ${cls}" data-step="${n}">${n}. ${s}</span>`;
  }).join('');
  crumbs.querySelectorAll('.c').forEach(el=>{
    el.addEventListener('click',()=>{
      const n=parseInt(el.dataset.step);
      if(n<=state.maxStep){ state.step=n; renderAll(); }
    });
  });
}

function renderWorkbookPage(a){
  const useFull = state.workbookMode==='full';
  let html = `<div class="page wb-page" data-pg="Workbook · ${a.title}">
    <div class="kicker">WORKBOOK · ${a.section}</div>
    <h2 class="ptitle" style="font-size:17px;">${a.title} — 학습지</h2>
    <div class="wb-body">`;

  // vocab / wordlist block
  const vocabPairs = useFull ? a.vocab : (a.wbExisting.find(w=>w.type==='wordlist') ?
      a.wbExisting.find(w=>w.type==='wordlist').pairs.concat(a.wbGenerated.wordlist||[]) :
      a.vocab);
  html += `<div class="wb-section">
    <h4>A. 단어 리스트 <span class="wtag ${useFull?'gen':'existing'}">${useFull?'AI 생성':'기존+보완'}</span></h4>
    <table class="vocab-table"><tbody>`;
  for(let i=0;i<vocabPairs.length;i+=2){
    const p1=vocabPairs[i], p2=vocabPairs[i+1];
    html += `<tr><td>${p1[0]}</td><td>${p1[1]}</td>${p2?`<td>${p2[0]}</td><td>${p2[1]}</td>`:'<td></td><td></td>'}</tr>`;
  }
  html += `</tbody></table></div>`;

  // existing structured items (unless full-regen mode, still show original type but tag as generated/reworked)
  a.wbExisting.forEach(w=>{
    const tag = useFull ? `<span class="wtag gen">AI 재구성</span>` : `<span class="wtag existing">기존</span>`;
    if(w.type==='tf'){
      html += `<div class="wb-section"><h4>${w.title} ${tag}</h4><div class="qlist">`;
      w.items.forEach((it,i)=>{ html += `<div class="qitem tfrow">${i+1}. ${it[0]} &nbsp; <b>[ ${it[1]?'T':'F'} ]</b></div>`; });
      html += `</div></div>`;
    } else if(w.type==='unscramble'){
      html += `<div class="wb-section"><h4>${w.title} ${tag}</h4><div class="qlist">`;
      w.items.forEach((it,i)=>{ html += `<div class="qitem tfrow">${i+1}. ${it[0].toUpperCase()} → <i>${it[1]}</i></div>`; });
      html += `</div></div>`;
    } else if(w.type==='match'){
      html += `<div class="wb-section"><h4>${w.title} ${tag}</h4><div class="qlist">`;
      w.items.forEach((it,i)=>{ html += `<div class="qitem matchrow">${i+1}. ${it[0]} → ${it[1]}</div>`; });
      html += `</div></div>`;
    } else if(w.type==='mcOld'){
      html += `<div class="wb-section"><h4>${w.title} ${tag}</h4><div class="qlist">`;
      w.items.forEach((it,i)=>{
        html += `<div class="qitem mcq"><div class="q">${i+1}. ${it[0]}</div><div class="opts">${it[1].map((o,j)=>`${String.fromCharCode(97+j)}) ${o}`).join(' &nbsp; ')} &nbsp; <b>(정답: ${String.fromCharCode(97+it[2])})</b></div></div>`;
      });
      html += `</div></div>`;
    }
  });

  // generated mc (4-choice)
  if(a.wbGenerated.mc){
    html += `<div class="wb-section"><h4>B. 4지선다 문제 <span class="wtag gen">AI 생성</span></h4><div class="qlist">`;
    a.wbGenerated.mc.forEach((q,i)=>{
      html += `<div class="qitem mcq"><div class="q">${i+1}. ${q[0]}</div><div class="opts">${q[1].map((o,j)=>`${String.fromCharCode(97+j)}) ${o}`).join(' &nbsp; ')} &nbsp; <b>(정답: ${String.fromCharCode(97+q[2])})</b></div></div>`;
    });
    html += `</div></div>`;
  }

  html += `</div></div>`;
  return html;
}

/* ============================= MAIN RENDER ============================= */
function renderAll(){
  renderNav();
  const panel = document.getElementById('panel');
  let html='';
  if(state.step===1) html = renderStepAcademy();
  else if(state.step===2) html = renderStepMedia();
  else if(state.step===3) html = renderStepTemplate();
  else if(state.step===4) html = renderStepSample();
  else if(state.step===5) html = renderStepSelect();
  else if(state.step===6) html = renderStepWorkbook();
  else if(state.step===7) html = renderStepPreview();
  panel.innerHTML = html;
  bindStepEvents();
  updateFooter();
  window.scrollTo({top:0, behavior:'instant'});
}

function bindStepEvents(){
  if(state.step===1){
    const toggle = document.getElementById('academyToggle');
    const fields = document.getElementById('academyFields');
    const previewCard = document.getElementById('academyPreviewCard');
    const nameEl = document.getElementById('acName');
    const classEl = document.getElementById('acClass');
    const courseEl = document.getElementById('acCourse');
    toggle.addEventListener('change', ()=>{
      state.academy.enabled = toggle.checked;
      fields.style.opacity = toggle.checked ? '1' : '.4';
      fields.style.pointerEvents = toggle.checked ? 'auto' : 'none';
      previewCard.style.display = toggle.checked ? '' : 'none';
    });
    function syncPreview(){
      state.academy.name = nameEl.value;
      state.academy.className = classEl.value;
      state.academy.course = courseEl.value;
      const line1 = classEl.value ? `${nameEl.value||'학원명'} · ${classEl.value}` : (nameEl.value||'학원명');
      document.querySelector('.ap-name').textContent = line1;
      document.querySelector('.ap-course').textContent = courseEl.value;
    }
    [nameEl,classEl,courseEl].forEach(el=>el.addEventListener('input', syncPreview));
  }
  if(state.step===2){
    document.querySelectorAll('.media-card').forEach(el=>{
      el.addEventListener('click',()=>{
        const k = el.dataset.k;
        if(!MEDIA[k].avail) return;
        state.media = k; state.template=null; state.selected=[];
        renderAll();
      });
    });
  }
  if(state.step===3){
    document.querySelectorAll('.tpl-card').forEach(el=>{
      el.addEventListener('click',()=>{ state.template = el.dataset.t; renderAll(); });
    });
  }
  if(state.step===5){
    document.querySelectorAll('.pick-card').forEach(el=>{
      el.addEventListener('click',(e)=>{
        e.preventDefault();
        const id = el.dataset.id;
        const idx = state.selected.indexOf(id);
        if(idx>-1) state.selected.splice(idx,1); else state.selected.push(id);
        renderAll();
      });
    });
  }
  if(state.step===6){
    document.querySelectorAll('.mode-opt').forEach(el=>{
      el.addEventListener('click',()=>{ state.workbookMode = el.dataset.m; renderAll(); });
    });
  }
  if(state.step===7){
    const ctaPrint = document.getElementById('ctaPrint');
    const ctaPdf = document.getElementById('ctaPdf');
    const ctaExtra = document.getElementById('ctaExtra');
    if(ctaPrint) ctaPrint.addEventListener('click',()=>{ state.submittedPrint = true; renderAll(); });
    if(ctaPdf) ctaPdf.addEventListener('click',()=>{ state.submittedPdf = true; renderAll(); });
    if(ctaExtra) ctaExtra.addEventListener('click',()=>{
      window.open('https://winsome-pqcbg96sc-007s-projects-6a69327c.vercel.app/', '_blank', 'noopener');
    });
  }
}

function canProceed(){
  if(state.step===1) return true;
  if(state.step===2) return !!state.media;
  if(state.step===3) return !!state.template;
  if(state.step===4) return true;
  if(state.step===5) return state.selected.length>0;
  if(state.step===6) return true;
  return false;
}

function updateFooter(){
  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');
  btnPrev.style.visibility = state.step===1 ? 'hidden' : 'visible';
  if(state.step===7){ btnNext.style.display='none'; } else {
    btnNext.style.display='inline-block';
    btnNext.disabled = !canProceed();
    btnNext.textContent = state.step===6 ? '미리보기 →' : '다음';
  }
}

document.getElementById('btnPrev').addEventListener('click',()=>{ if(state.step>1){ state.step--; renderAll(); } });
document.getElementById('btnNext').addEventListener('click',()=>{
  if(!canProceed()) return;
  state.step = Math.min(7, state.step+1);
  state.maxStep = Math.max(state.maxStep, state.step);
  renderAll();
});

renderAll();
</script>
