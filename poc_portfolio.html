<style>
:root{--black:#0B0D12;--blue:#3B5BFF;--green:#0E9A62;--hair:rgba(255,255,255,.12)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Pretendard Variable',Pretendard,-apple-system,system-ui,sans-serif;background:var(--black);display:flex;flex-direction:column;overflow:hidden}
.switch{
  height:54px;flex-shrink:0;background:var(--black);border-bottom:1px solid var(--hair);
  display:flex;align-items:center;gap:8px;padding:0 20px;color:#fff;
}
.sw-logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;margin-right:14px;letter-spacing:-.01em}
.sw-logo em{font-style:normal;color:var(--blue);filter:brightness(1.4)}
.sw-tab{
  display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:rgba(255,255,255,.55);
  border:1px solid transparent;border-radius:999px;padding:8px 18px;cursor:pointer;
  font-family:inherit;background:none;transition:all .16s;letter-spacing:-.01em;
}
.sw-tab .no{
  font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;
  width:18px;height:18px;border-radius:6px;background:rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
}
.sw-tab:hover{color:#fff}
.sw-tab.on{color:#fff;background:rgba(255,255,255,.08);border-color:var(--hair)}
.sw-tab.on:nth-of-type(1) .no{background:var(--blue)}
.sw-tab.on:nth-of-type(2) .no{background:var(--green)}
.sw-tab.on:nth-of-type(3) .no{background:#F0B429;color:var(--black)}
.sw-note{margin-left:auto;font-size:11px;color:rgba(255,255,255,.35)}
.stage{flex:1;position:relative;background:#fff}
.stage iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:none;background:#fff}
.stage iframe.on{display:block}
.loading{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:#98A2B3;font-size:13px;background:#fff;z-index:1;pointer-events:none;
  opacity:1;transition:opacity .3s;
}
.loading.off{opacity:0}
@media (max-width:720px){
  .sw-tab span.lbl{display:none}
  .sw-note{display:none}
  .sw-tab{padding:8px 12px}
}
</style>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NE TIMES LIBRARY</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0B0D12;
  --ink:#14171F;
  --gray:#7A8090;
  --gray-2:#AFB4C0;
  --bg:#FFFFFF;
  --bg-soft:#F6F7F9;
  --hair:#E9EBEF;
  --hair-dark:rgba(255,255,255,.12);
  --blue:#3B5BFF;
  --blue-soft:#EEF1FF;
  --red:#E5477A;--red-soft:#FDEEF4;
  --orange:#E8862A;--orange-soft:#FDF2E7;
  --green:#12A66F;--green-soft:#E9F7F1;
  --sh:0 1px 2px rgba(11,13,18,.04),0 12px 40px rgba(11,13,18,.08);
  --sh-lg:0 2px 6px rgba(11,13,18,.06),0 32px 80px rgba(11,13,18,.14);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Pretendard Variable',Pretendard,-apple-system,system-ui,sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.65;font-size:15.5px;
  -webkit-font-smoothing:antialiased;letter-spacing:-.01em;overflow-x:hidden;
}
.en{font-family:'Space Grotesk','Pretendard Variable',sans-serif;letter-spacing:-.02em}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}
.wrap{max-width:1120px;margin:0 auto;padding:0 28px}

/* 공통 타이포 */
.kicker{
  font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;letter-spacing:.22em;
  color:var(--gray);text-transform:uppercase;display:block;margin-bottom:16px;
}
h2.title{
  font-weight:800;letter-spacing:-.035em;line-height:1.22;
  font-size:clamp(28px,3.6vw,42px);margin-bottom:16px;
}
p.desc{color:var(--gray);font-size:16px;max-width:560px;font-weight:450}
p.desc b{color:var(--ink);font-weight:700}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-size:14.5px;font-weight:700;border-radius:999px;padding:14px 28px;transition:all .18s;letter-spacing:-.01em;
}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(59,91,255,.35)}
.btn-white{background:#fff;color:var(--black)}
.btn-white:hover{transform:translateY(-1px)}
.btn-ghost{border:1px solid var(--hair-dark);color:#fff}
.btn-ghost:hover{background:rgba(255,255,255,.06)}
.btn-black{background:var(--black);color:#fff}
.btn-black:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(11,13,18,.25)}
.lv{font-size:10px;font-weight:800;border-radius:5px;padding:3px 8px;letter-spacing:.06em;font-family:'Space Grotesk',sans-serif}
.lv.kinder{background:var(--red-soft);color:var(--red)}
.lv.kids{background:var(--orange-soft);color:var(--orange)}
.lv.junior{background:var(--green-soft);color:var(--green)}
.lv.times{background:var(--blue-soft);color:var(--blue)}
.reveal{opacity:0;transform:translateY(18px);transition:opacity .6s cubic-bezier(.2,.7,.3,1),transform .6s cubic-bezier(.2,.7,.3,1)}
.reveal.in{opacity:1;transform:none}
@media (prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}html{scroll-behavior:auto}}

/* ══ GNB ══ */
.gnb{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(11,13,18,.7);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--hair-dark);
}
.gnb .wrap{display:flex;align-items:center;height:64px;gap:40px}
.logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;color:#fff;letter-spacing:.01em}
.logo em{font-style:normal;color:var(--blue);margin-left:2px}
.gnb nav{display:flex;gap:28px;flex:1;font-size:13.5px;font-weight:500;color:rgba(255,255,255,.6)}
.gnb nav a:hover{color:#fff}
.gnb .cta{font-size:13px;font-weight:700;background:#fff;color:var(--black);border-radius:999px;padding:9px 18px}

/* ══ HERO ══ */
.hero{
  background:var(--black);color:#fff;padding:170px 0 0;position:relative;overflow:hidden;
}
.hero::after{
  content:"";position:absolute;bottom:-1px;left:0;right:0;height:120px;
  background:linear-gradient(transparent,var(--black));pointer-events:none;
}
.hero-glow{
  position:absolute;top:-220px;left:50%;transform:translateX(-50%);
  width:900px;height:560px;border-radius:50%;
  background:radial-gradient(closest-side,rgba(59,91,255,.28),transparent);
  filter:blur(10px);pointer-events:none;
}
.hero .center{text-align:center;position:relative;z-index:2}
.hero .over{
  display:inline-flex;align-items:center;gap:10px;font-size:12.5px;font-weight:600;
  color:rgba(255,255,255,.65);border:1px solid var(--hair-dark);border-radius:999px;
  padding:7px 16px;margin-bottom:34px;background:rgba(255,255,255,.04);
}
.hero .over i{width:6px;height:6px;border-radius:50%;background:var(--blue);display:block}
.hero h1{
  font-family:'Space Grotesk',sans-serif;font-weight:700;
  font-size:clamp(52px,9.5vw,118px);line-height:.98;letter-spacing:-.045em;
  margin-bottom:26px;
}
.hero h1 .row2{color:transparent;-webkit-text-stroke:1.5px rgba(255,255,255,.5)}
.hero .sub{
  font-size:clamp(17px,2vw,21px);font-weight:600;letter-spacing:-.02em;margin-bottom:14px;
}
.hero .sub-desc{
  font-size:15px;color:rgba(255,255,255,.55);max-width:480px;margin:0 auto 40px;font-weight:450;
}
.hero .btn-row{display:flex;gap:12px;justify-content:center;margin-bottom:74px;flex-wrap:wrap}

/* 히어로 하단 — 서가 스트립 */
.strip{
  position:relative;z-index:1;display:flex;gap:18px;justify-content:center;
  padding-bottom:90px;transform:translateY(6px);
}
.s-card{cursor:pointer;transition:transform .18s;}
.s-card:hover{transform:translateY(-6px)!important}
.s-card-base{
  width:230px;background:#fff;border-radius:14px;color:var(--ink);overflow:hidden;
  box-shadow:var(--sh-lg);flex-shrink:0;
}
.s-card .band{height:76px;display:flex;align-items:flex-end;padding:10px 14px;font-size:22px}
.s-card .body{padding:13px 16px 15px}
.s-card h4{font-size:13.5px;font-weight:700;line-height:1.45;margin:7px 0 4px;letter-spacing:-.015em}
.s-card .d{font-size:10.5px;color:var(--gray-2);font-family:'Space Grotesk',sans-serif}
.s-card.tilt-l{transform:rotate(-2.5deg) translateY(14px)}
.s-card.tilt-r{transform:rotate(2.5deg) translateY(14px)}
.s-card.lock{position:relative}
.s-card.lock .band::after{
  content:"12개월 전용";position:absolute;top:12px;right:12px;font-size:9.5px;font-weight:800;
  background:var(--black);color:#fff;border-radius:999px;padding:4px 10px;letter-spacing:.02em;
}

/* ══ 지표 스트립 ══ */
.metrics{border-bottom:1px solid var(--hair);background:var(--bg)}
.metrics .wrap{
  display:grid;grid-template-columns:repeat(4,1fr);
}
.metric{padding:34px 10px;text-align:center;border-right:1px solid var(--hair)}
.metric:last-child{border-right:none}
.metric .n{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:30px;letter-spacing:-.03em}
.metric .n small{font-family:Pretendard,sans-serif;font-size:14px;color:var(--gray);font-weight:600;margin-left:2px}
.metric .l{font-size:12.5px;color:var(--gray);margin-top:2px}

/* ══ 콘셉트 (AS-IS/TO-BE) ══ */
.concept{padding:120px 0}
.concept .head{margin-bottom:56px}
.shift{
  display:grid;grid-template-columns:1fr auto 1.3fr;gap:26px;align-items:stretch;max-width:920px;
}
.shift-box{border:1px solid var(--hair);border-radius:20px;padding:34px 32px}
.shift-box .cap{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;letter-spacing:.2em;color:var(--gray-2);margin-bottom:16px}
.shift-box h3{font-size:22px;font-weight:800;letter-spacing:-.025em;line-height:1.4;margin-bottom:8px}
.shift-box p{font-size:13.5px;color:var(--gray)}
.shift-box.to{
  background:var(--black);color:#fff;border-color:var(--black);box-shadow:var(--sh-lg);
}
.shift-box.to .cap{color:var(--blue)}
.shift-box.to h3 em{font-style:normal;color:var(--blue);filter:brightness(1.35)}
.shift-box.to p{color:rgba(255,255,255,.55)}
.shift-arrow{display:flex;align-items:center;color:var(--gray-2);font-size:22px;font-weight:300}
.concept-foot{margin-top:24px;font-size:13px;color:var(--gray)}

/* ══ 피처 공통 ══ */
.feature{padding:110px 0;border-top:1px solid var(--hair)}
.feature.soft{background:var(--bg-soft)}
.f-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.f-grid.flip > .f-visual{order:-1}
.f-list{margin-top:30px;display:flex;flex-direction:column}
.f-item{display:flex;gap:16px;padding:16px 0;border-top:1px solid var(--hair);align-items:baseline}
.f-item .no{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;color:var(--gray-2);width:26px;flex-shrink:0}
.f-item .b b{display:block;font-size:15px;font-weight:700;letter-spacing:-.015em;margin-bottom:2px}
.f-item .b span{font-size:13.5px;color:var(--gray)}

/* UI 프레임 */
.frame{
  background:#fff;border-radius:18px;border:1px solid var(--hair);box-shadow:var(--sh);overflow:hidden;
}
.frame .bar{
  height:42px;border-bottom:1px solid var(--hair);display:flex;align-items:center;gap:6px;padding:0 16px;
}
.frame .bar i{width:9px;height:9px;border-radius:50%;background:var(--hair);display:block}
.frame .bar .url{
  margin-left:10px;font-family:'Space Grotesk',sans-serif;font-size:11px;color:var(--gray-2);
  background:var(--bg-soft);border-radius:7px;padding:5px 14px;letter-spacing:0;
}
.frame .scr{padding:22px}

/* 레벨 */
.rung{
  display:flex;align-items:center;gap:14px;border:1px solid var(--hair);
  border-radius:12px;padding:14px 16px;margin-bottom:10px;transition:all .16s;background:#fff;
}
.rung:hover{border-color:var(--gray-2)}
.rung .nm{font-weight:700;font-size:13.5px;width:64px;letter-spacing:-.01em}
.rung .tg{font-size:12px;color:var(--gray);flex:1}
.rung .ct{font-family:'Space Grotesk',sans-serif;font-size:11.5px;color:var(--gray-2);font-weight:600}
.rung.now{border-color:var(--blue);background:var(--blue-soft)}
.rung.now .st{font-size:11px;font-weight:800;color:var(--blue)}
.rung-note{
  margin-top:6px;font-size:12.5px;color:var(--gray);background:var(--bg-soft);
  border-radius:10px;padding:12px 15px;
}
.rung-note b{color:var(--ink)}

/* 큐레이션 */
.cv-now{cursor:pointer}
.cv-now-base{
  background:var(--black);color:#fff;border-radius:14px;padding:18px 20px;margin-bottom:16px;position:relative;
}
.cv-now .cap{font-family:'Space Grotesk',sans-serif;font-size:9.5px;letter-spacing:.2em;color:rgba(255,255,255,.4);margin-bottom:7px}
.cv-now .t{font-weight:700;font-size:15.5px;line-height:1.45;letter-spacing:-.015em}
.cv-now .tag{
  position:absolute;top:-11px;right:16px;background:var(--blue);color:#fff;
  font-size:10px;font-weight:800;border-radius:999px;padding:4px 12px;
}
.cv-sep{
  text-align:center;font-family:'Space Grotesk',sans-serif;font-size:10px;letter-spacing:.24em;
  color:var(--gray-2);padding:4px 0 14px;
}
.cv-item{cursor:pointer;transition:border-color .15s}
.cv-item:hover{border-color:var(--blue)}
.cv-item-base{
  display:flex;align-items:center;gap:13px;border:1px solid var(--hair);
  border-radius:12px;padding:12px 15px;margin-bottom:9px;font-size:13px;background:#fff;
}
.cv-item .yr{
  font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:12px;color:var(--blue);
  background:var(--blue-soft);border-radius:7px;padding:4px 10px;flex-shrink:0;
}
.cv-item .t{font-weight:600;flex:1;line-height:1.45;letter-spacing:-.01em}
.cv-item .tc{font-size:9.5px;font-weight:800;color:var(--gray);border:1px solid var(--hair);border-radius:999px;padding:3px 9px;flex-shrink:0}

/* ══ 컬렉션 ══ */
.packs{padding:120px 0;border-top:1px solid var(--hair)}
.packs .head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:50px;gap:24px;flex-wrap:wrap}
.pk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.pk{
  border-radius:20px;padding:30px 28px;min-height:300px;color:#fff;position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:flex-end;transition:transform .2s;
}
.pk:hover{transform:translateY(-6px)}
.pk{cursor:pointer}
.pk .cat{font-family:'Space Grotesk',sans-serif;font-size:10.5px;font-weight:600;letter-spacing:.22em;opacity:.65;margin-bottom:10px;text-transform:uppercase}
.pk h3{font-size:21px;font-weight:800;letter-spacing:-.025em;line-height:1.4;margin-bottom:6px}
.pk .m{font-size:12.5px;opacity:.7;margin-bottom:18px}
.pk .go{font-size:13px;font-weight:700;display:inline-flex;gap:6px;align-items:center;opacity:.9}
.pk-a{background:linear-gradient(155deg,#2F49D8,#1B2D9B)}
.pk-b{background:linear-gradient(155deg,#0FA36B,#0A6844)}
.pk-c{background:linear-gradient(155deg,#3A3F52,#14171F)}
.pk .lock{
  position:absolute;top:20px;right:22px;font-size:10px;font-weight:800;
  background:rgba(255,255,255,.14);backdrop-filter:blur(4px);border-radius:999px;padding:5px 12px;
}
.pk .idx{
  position:absolute;top:18px;left:24px;font-family:'Space Grotesk',sans-serif;
  font-size:64px;font-weight:700;opacity:.14;letter-spacing:-.05em;
}
.packs-foot{margin-top:26px;font-size:13px;color:var(--gray)}

/* 리포트 */
.rp-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px}
.rp-head .t{font-weight:700;font-size:14.5px;letter-spacing:-.015em}
.rp-head .m{font-family:'Space Grotesk',sans-serif;font-size:11px;color:var(--green);font-weight:600}
.rp-metrics{display:flex;gap:10px;margin-bottom:18px}
.rp-metric{flex:1;background:var(--bg-soft);border-radius:12px;padding:14px 15px}
.rp-metric .n{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;letter-spacing:-.02em}
.rp-metric .l{font-size:11px;color:var(--gray)}
.rp-bar{display:flex;align-items:center;gap:10px;font-size:11px;margin-bottom:8px}
.rp-bar .lb{width:30px;color:var(--gray-2);font-family:'Space Grotesk',sans-serif;font-weight:600}
.rp-tr{flex:1;height:14px;background:var(--bg-soft);border-radius:5px;overflow:hidden}
.rp-fl{height:100%;background:var(--blue);border-radius:5px}
.rp-ins{margin-top:14px;font-size:12px;background:var(--blue-soft);border-radius:10px;padding:11px 14px;color:var(--ink)}
.rp-ins b{color:var(--blue)}

/* ══ 플랜 ══ */
.plans{padding:120px 0;background:var(--black);color:#fff}
.plans .head{text-align:center;margin-bottom:60px}
.plans .head .desc{margin:0 auto;color:rgba(255,255,255,.5)}
.pl-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:840px;margin:0 auto}
.pl{
  border:1px solid var(--hair-dark);border-radius:22px;padding:38px 36px;background:rgba(255,255,255,.03);
}
.pl.hi{background:#fff;color:var(--ink);border-color:#fff;position:relative}
.pl.hi .flag{
  position:absolute;top:-13px;left:36px;background:var(--blue);color:#fff;
  font-size:11px;font-weight:800;border-radius:999px;padding:5px 14px;letter-spacing:.01em;
}
.pl .nm{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;opacity:.6;margin-bottom:14px}
.pl .pr{font-size:36px;font-weight:800;letter-spacing:-.03em}
.pl .pr small{font-size:14px;font-weight:600;opacity:.5;letter-spacing:0}
.pl .per{font-size:12.5px;opacity:.5;margin-bottom:26px}
.pl ul{list-style:none;display:flex;flex-direction:column;margin-bottom:30px}
.pl li{display:flex;gap:11px;font-size:14px;padding:10px 0;border-top:1px solid var(--hair-dark);align-items:baseline}
.pl.hi li{border-color:var(--hair)}
.pl li .ck{color:var(--blue);font-weight:800;flex-shrink:0;font-size:12px}
.pl.hi li .ck{color:var(--green)}
.pl li.mut{opacity:.35}
.pl li.mut .ck{visibility:hidden}
.pl .btn{width:100%}
.pl-note{max-width:840px;margin:20px auto 0;font-size:12px;color:rgba(255,255,255,.35);text-align:center}

/* ══ FAQ ══ */
.faq{padding:110px 0}
.faq .inner{max-width:720px;margin:0 auto}
.faq .head{margin-bottom:40px}
details{border-top:1px solid var(--hair)}
details:last-of-type{border-bottom:1px solid var(--hair)}
summary{
  list-style:none;cursor:pointer;font-size:15.5px;font-weight:700;padding:22px 34px 22px 0;
  position:relative;letter-spacing:-.015em;
}
summary::-webkit-details-marker{display:none}
summary::after{
  content:"+";position:absolute;right:2px;top:50%;transform:translateY(-50%);
  font-size:20px;font-weight:300;color:var(--gray-2);transition:transform .2s;
}
details[open] summary::after{transform:translateY(-50%) rotate(45deg)}
details .a{padding:0 0 24px;font-size:14px;color:var(--gray);max-width:620px}

/* ══ CTA ══ */
.final{padding:130px 0;background:var(--black);color:#fff;text-align:center;position:relative;overflow:hidden}
.final .glow{
  position:absolute;bottom:-260px;left:50%;transform:translateX(-50%);
  width:800px;height:480px;border-radius:50%;
  background:radial-gradient(closest-side,rgba(59,91,255,.3),transparent);pointer-events:none;
}
.final h2{
  font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(34px,5.4vw,64px);
  letter-spacing:-.04em;line-height:1.08;margin-bottom:18px;position:relative;
}
.final h2 em{font-style:normal;color:var(--blue);filter:brightness(1.4)}
.final p{color:rgba(255,255,255,.5);margin-bottom:38px;position:relative;font-size:15px}
footer{background:var(--black);border-top:1px solid var(--hair-dark);color:rgba(255,255,255,.35);padding:28px 0;font-size:12px}
footer .wrap{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}

@media (max-width:960px){
  .strip{flex-wrap:wrap;padding-left:28px;padding-right:28px}
  .s-card{cursor:pointer;transition:transform .18s;}
.s-card:hover{transform:translateY(-6px)!important}
.s-card-base{width:calc(50% - 9px)}
  .metrics .wrap{grid-template-columns:1fr 1fr}
  .metric:nth-child(2){border-right:none}
  .metric{border-bottom:1px solid var(--hair)}
  .metric:nth-child(3),.metric:nth-child(4){border-bottom:none}
  .f-grid{grid-template-columns:1fr;gap:44px}
  .f-grid.flip > .f-visual{order:0}
  .pk-grid{grid-template-columns:1fr;max-width:460px}
  .shift{grid-template-columns:1fr}
  .shift-arrow{transform:rotate(90deg);justify-content:center;padding:2px 0}
  .pl-grid{grid-template-columns:1fr;max-width:460px}
  .gnb nav{display:none}
}
</style>
</head>

        <h3>이번 주 신문 <em>+ 지난 호 1,081개 무제한</em></h3>
        <p>2005년 창간호부터 최신호까지, 전 지면 아카이브가 구독 기간 내내 열려 있는 나만의 서재.</p>
      </div>
    </div>
    <div class="concept-foot reveal">구독 중에만 열리는 서재 — 구독이 계속되는 이유가 됩니다.</div>
  </div>
</section>

    <div class="reveal">
      <details open>
        <summary>구독 중인 레벨이 아닌 다른 레벨도 볼 수 있나요?</summary>
        <div class="a">네. 라이브러리에서는 구독 지면과 무관하게 KINDER부터 Times까지 전 레벨을 열람할 수 있습니다. 형제·자매가 함께 쓰거나, 다음 레벨을 미리 읽는 용도로 활용됩니다.</div>

 openModal(`<div class="m-band"><div class="m-close" onclick="closeModal()">✕</div>

 </div>`)}

 "1036":{title:"Advanced Camera Captures New Details of Our Universe",lv:"LEVEL 3",sec:"SCIENCE",issue:"1036호 · 2025.08.04",url:"https://www.netimes.co.kr/pages/times/reading.asp?seq=34934",

 "1078":{title:"Fika Shows Balance in Swedish Life",lv:"LEVEL 2",sec:"LIFESTYLE",issue:"1078호 · 2026.06.15",url:"https://www.netimes.co.kr/pages/times/reading.asp?seq=36889",

 "1081":{title:"Sagrada Familia Reaches Historic Milestone",lv:"LEVEL 3",sec:"READ AND LEARN",issue:"1081호 · 2026.07.06",url:"https://www.netimes.co.kr/pages/times/reading.asp?seq=37090",
  ex:"After 144 years of construction, the main structure of the Sagrada Família basilica in Barcelona, Spain, has finally been completed.",
  dq:"What famous structure do you want to see in person? Why?"},
 "1069":{title:"BTS Reunites for Historic Comeback Concert",lv:"LEVEL 2",sec:"SPORTS & ENT.",issue:"1069호 · 2026.04.13",url:"https://www.netimes.co.kr/pages/times/reading.asp?seq=36502",
  ex:"BTS held their long-awaited comeback concert at Gwanghwamun Square in Seoul, marking the group's first performance together after completing their military service.",
  dq:"Why do you think BTS has such a strong global influence?"}
};
const bg=document.getElementById('modalBg'),box=document.getElementById('modalBox'),toastEl=document.getElementById('toast');
let toastT,recordCount=11;
function toast(msg){toastEl.textContent=msg;toastEl.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>toastEl.classList.remove('on'),2800)}
function openModal(html){box.innerHTML=html;bg.classList.add('on');document.body.style.overflow='hidden'}
function closeModal(){bg.classList.remove('on');document.body.style.overflow=''}
bg.addEventListener('click',e=>{if(e.target===bg)closeModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
function articleModal(no){
 const a=ARTICLES[no];if(!a){toast('이 계열의 이번 주 기사는 준비 중입니다');return}
 openModal(`<div class="m-band"><div class="m-close" onclick="closeModal()">✕</div>
  <div class="m-meta"><span class="lv">${a.lv}</span><span class="lv" style="background:var(--bg-soft);color:var(--gray)">${a.sec}</span></div>
  <div class="m-title">${a.title}</div><div class="m-issue en">NE TIMES ${a.issue}</div></div>
 <div class="m-body">

  </div></div>`)}

 if(!b){toast('이 계열의 이번 주 큐레이션은 준비 중입니다');return}
 const t=b.textContent;

 articleModal(no)})});

 tx.replaceWith(ta);ta.focus();
 const done=()=>{
  if(ta.value.trim().length<10){toast('10자 이상 작성하면 기록이 저장됩니다');ta.focus();return}
  const div=document.createElement('div');div.className='ed-tx';div.textContent=ta.value;ta.replaceWith(div);

  const st=step3.querySelector('.ed-st');st.className='ed-st ok';st.textContent='✓ DONE';

  const foot=document.querySelector('.ed-foot span');

  toast('Week 14 기록 완료 — 7주 연속 기록 달성 🔥');
 };
 ta.addEventListener('keydown',ev=>{if(ev.key==='Enter'&&(ev.metaKey||ev.ctrlKey))done()});
 ta.addEventListener('blur',()=>{if(ta.value.trim().length>=10)done()});
})}
// 화상수업 토론 예약 링크
document.querySelectorAll('.ed-foot span').forEach((sp,i)=>{if(sp.textContent.includes('토론 예약')){sp.style.cursor='pointer';sp.style.color='var(--green)';sp.style.fontWeight='700';sp.addEventListener('click',()=>articleModal('1036'))}});

 toast(b.textContent.includes('알림')?'플러스 출시 알림이 신청되었습니다 (데모)':'진로 계열 선택 화면으로 이동합니다 (데모)')})});

 "36882":{title:"Mime Festival Brings Joy to Chuncheon",lv:1,sec:"Nation",secLabel:"NATION",issue:"1078호",date:"2026.06.15",em:"🎭",band:"linear-gradient(135deg,#E0F3E8,#C2E8D2)",

const TRACKS = [
 {id:"medical",nm:"의약",art:null},
 {id:"science",nm:"자연과학·공학",art:"1036"},
 {id:"business",nm:"경제·경영",art:"36881"},
 {id:"society",nm:"사회·문화",art:"1078"},
 {id:"art",nm:"건축·예술",art:"1081"},
 {id:"media",nm:"엔터·미디어",art:"1069"},
];

/* ═══════════ 상태 (세션 메모리) ═══════════ */
const state = {
 read:new Set(["1036","1078"]),
 scrap:new Set(["1036"]),
 words:new Set(["unprecedented","observatory","ritual"]),
 track:"science",
 filters:{lv:"all",sec:"all",scrap:false,q:""},
 records:[
  {week:"W09",art:"1078",s:"Fika is a Swedish coffee-break ritual that emphasizes slowing down and connecting with others.",o:"쉬는 시간을 '문화'로 만든 게 인상적이었다. 효율보다 관계를 택한 사회의 모습.",c:"문화가 제도(직장 규칙)로 자리 잡는 과정이 사회학 탐구 주제가 될 수 있겠다."},

 ],
 streak:6, weekNo:14,

/* ═══════════ 유틸 ═══════════ */
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
let toastT;
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),2700)}
function lvChip(a){return `<span class="lv l${a.lv}">LEVEL ${a.lv}</span><span class="lv sec">${a.secLabel}</span>`}

/* ═══════════ 뷰 전환 ═══════════ */
const TITLES={lib:"라이브러리",pf:"내 포트폴리오",rp:"읽기 리포트"};
$$('.sb-item[data-view]').forEach(b=>b.addEventListener('click',()=>{
 $$('.sb-item').forEach(x=>x.classList.remove('on'));b.classList.add('on');
 $$('.view').forEach(v=>v.classList.remove('on'));
 const v=b.dataset.view;$('#view-'+v).classList.add('on');$('#topTitle').textContent=TITLES[v];
 if(v==='pf')renderPF(); if(v==='rp')renderRP();
 window.scrollTo({top:0});
}));

/* ═══════════ 라이브러리 렌더 ═══════════ */
function renderGrid(){
 const f=state.filters, g=$('#articleGrid');
 const list=Object.entries(ARTICLES).filter(([id,a])=>{
  if(f.lv!=='all'&&a.lv!=+f.lv)return false;
  if(f.sec!=='all'&&a.sec!==f.sec)return false;
  if(f.scrap&&!state.scrap.has(id))return false;
  if(f.q&&!a.title.toLowerCase().includes(f.q))return false;
  return true;
 });
 $('#gridCount').textContent=`— ${list.length}편`;
 g.innerHTML=list.length?list.map(([id,a])=>`
  <div class="acard" onclick="openReader('${id}')">
    <div class="band" style="background:${a.band}">${a.em}
      ${state.read.has(id)?'<span class="read-mark">✓ 읽음</span>':''}
      <button class="scrap-star ${state.scrap.has(id)?'on':''}" onclick="event.stopPropagation();toggleScrap('${id}')">${state.scrap.has(id)?'★':'☆'}</button>
    </div>
    <div class="bd">
      <div class="meta">${lvChip(a)}</div>
      <h3>${a.title}</h3>
      <div class="dt en">${a.issue} · ${a.date}</div>
    </div>
  </div>`).join('')
 :'<div class="empty" style="grid-column:1/-1">조건에 맞는 기사가 없습니다. 필터를 조정해보세요.</div>';
}
function toggleScrap(id){
 if(state.scrap.has(id)){state.scrap.delete(id);toast('스크랩이 해제되었습니다')}
 else{state.scrap.add(id);toast('내 서재에 스크랩되었습니다 ⭐')}
 renderGrid();
}
$$('.fchip').forEach(c=>c.addEventListener('click',()=>{
 const f=c.dataset.f;
 if(f==='scrap'){state.filters.scrap=!state.filters.scrap;c.classList.toggle('on');renderGrid();return}
 $$(`.fchip[data-f="${f}"]`).forEach(x=>x.classList.remove('on'));c.classList.add('on');
 state.filters[f]=c.dataset.v;renderGrid();
}));
$('#searchInput').addEventListener('input',e=>{state.filters.q=e.target.value.trim().toLowerCase();renderGrid()});

/* ═══════════ 리더 ═══════════ */
function openReader(id){
 const a=ARTICLES[id];if(!a)return;
 state.read.add(id);
 const hasFull=!!a.sumEn;
 $('#reader').innerHTML=`
  <div class="rd-top">
    <button class="rd-close" onclick="closeReader()">✕</button>
    <div class="rd-meta">${lvChip(a)}</div>
    <div class="rd-title">${a.title}</div>
    <div class="rd-issue en">NE TIMES ${a.issue} · ${a.date}</div>
  </div>
  <div class="rd-body">
    <div class="rd-sec">Summary</div>
    <div class="rd-sum-ko">${a.sumKo}</div>
    ${a.sumEn?`<div class="rd-sum-en">${a.sumEn}</div>`:''}
    ${a.vocab?`<div class="rd-sec">Key Vocabulary <span style="letter-spacing:0;text-transform:none;font-weight:500">— 클릭하면 내 단어장에 저장</span></div>
    <div class="rd-vocab">${a.vocab.map(v=>`<button class="vchip ${state.words.has(v[0])?'saved':''}" onclick="saveWord('${v[0]}',this)"><b>${v[0]}</b> ${v[1]}</button>`).join('')}</div>`:''}
    ${a.dq?`<div class="rd-sec">Discussion Question</div>
    <div class="rd-dq"><span class="cap">화상수업 토론 주제로 연결됩니다</span>💬 ${a.dq}</div>`:''}
    <div class="rd-note">${hasFull?'전체 본문·음원·해석·단어장 전체는 원문 페이지에서 제공됩니다.':'이 기사의 상세 요약은 원문 페이지에서 확인할 수 있습니다.'}</div>
  </div>
  <div class="rd-foot no-print">
    <a class="btn btn-blue" href="${a.url}" target="_blank" rel="noopener">원문 전체 읽기 ↗</a>
    <button class="btn btn-green" onclick="openComposer('${id}')">✍️ 기록 작성</button>
    <button class="btn btn-line" onclick="toggleScrap('${id}');openReader('${id}')">${state.scrap.has(id)?'★ 스크랩됨':'☆ 스크랩'}</button>
  </div>`;
 $('#readerBg').classList.add('on');$('#reader').classList.add('on');
 document.body.style.overflow='hidden';
 renderGrid();
}
function closeReader(){$('#readerBg').classList.remove('on');$('#reader').classList.remove('on');document.body.style.overflow=''}
function saveWord(w,el){
 if(state.words.has(w)){state.words.delete(w);el.classList.remove('saved');toast(`'${w}' 단어장에서 제거됨`)}
 else{state.words.add(w);el.classList.add('saved');toast(`'${w}' 내 단어장에 저장됨 (${state.words.size}개)`)}
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeReader();closeComposer()}});

function renderPF(){

 const tr=TRACKS.find(t=>t.id===state.track), a=tr.art?ARTICLES[tr.art]:null;
 $('#weeklyArticle').innerHTML=a?`
  <div class="wk-article" onclick="openReader('${tr.art}')">
    <span class="em">${a.em}</span>
    <div><div class="t">${a.title}</div><div class="m en">${a.issue} · ${a.secLabel} · LEVEL ${a.lv}</div></div>
    <span class="go">→</span>
  </div>`
 :`<div class="empty">이 계열의 이번 주 큐레이션은 준비 중입니다.<br>다른 계열을 선택하거나 라이브러리에서 직접 골라보세요.</div>`;
 $('#btnCompose').style.display=a?'':'none';
 $('#btnCompose').onclick=()=>openComposer(tr.art);
 // 통계
 $('#pfStats').innerHTML=`

  <div class="stat"><div class="n">${state.read.size}<small>편</small></div><div class="l">읽은 기사</div></div>

  <div class="stat"><div class="n">🔥 ${state.streak}<small>주</small></div><div class="l">연속 기록</div></div>`;
 // 기록 리스트
 $('#recList').innerHTML=state.records.length?[...state.records].reverse().map(r=>{
  const a=ARTICLES[r.art];
  return `<div class="rec" onclick="openReader('${r.art}')">
    <div class="rc-top"><span class="wk">${r.week}</span><span class="tt">${a.title}</span></div>
    <div class="pv">"${r.o}"</div>
  </div>`}).join('')
 :'<div class="empty">아직 기록이 없습니다. 이번 주 기사로 첫 기록을 남겨보세요.</div>';

}
function setTrack(id){state.track=id;renderPF();const t=TRACKS.find(x=>x.id===id);toast(`진로 계열: ${t.nm} — 주간 큐레이션이 변경되었습니다`)}

    <div class="cp-step">
      <div class="st"><span class="no">1</span><span class="tt">Summary</span><span class="hint">— 기사를 영어 2~3문장으로</span></div>
      <textarea id="cpS" placeholder="${a.sumEn?a.sumEn.slice(0,60)+'… 를 참고해 나만의 문장으로':'기사 내용을 영어로 요약해보세요'}"></textarea>
    </div>

      <span class="time">✓ 자동 저장 중 · 저장 시 포트폴리오와 리포트에 즉시 반영됩니다</span>

 setTimeout(()=>$('#cpS').focus(),100);
}
function closeComposer(){$('#composerBg').classList.remove('on');document.body.style.overflow=''}
$('#composerBg').addEventListener('click',e=>{if(e.target.id==='composerBg')closeComposer()});
function saveRecord(id){
 const s=$('#cpS').value.trim(),o=$('#cpO').value.trim(),c=$('#cpC').value.trim();
 if((s+o+c).length<15){toast('세 칸 중 최소 한 칸을 15자 이상 작성해주세요');return}
 state.records.push({week:'W'+String(state.weekNo).padStart(2,'0'),art:id,s:s||'—',o:o||'—',c:c||'—'});
 state.read.add(id); state.streak++; state.weekNo++;
 closeComposer();renderPF();
 toast(`Week 기록 완료 — 이번 학기 ${state.records.length}번째 · 🔥 ${state.streak}주 연속!`);
}

/* ═══════════ 리포트 ═══════════ */
function renderRP(){
 $('#rpStats').innerHTML=`
  <div class="stat"><div class="n">${state.read.size}<small>편</small></div><div class="l">읽은 기사</div></div>
  <div class="stat"><div class="n">${state.records.length}<small>개</small></div><div class="l">작성한 기록</div></div>
  <div class="stat"><div class="n">${state.words.size}<small>개</small></div><div class="l">저장 단어</div></div>
  <div class="stat"><div class="n">${state.scrap.size}<small>편</small></div><div class="l">스크랩</div></div>`;
 // 섹션 분포 (읽은 기사 기준 실계산)
 const cnt={};[...state.read].forEach(id=>{const s=ARTICLES[id].secLabel;cnt[s]=(cnt[s]||0)+1});
 const max=Math.max(...Object.values(cnt),1);
 const colors=['#3B5BFF','#0E9A62','#E8862A','#7048C8','#E5477A','#F0B429'];
 $('#secBars').innerHTML=Object.entries(cnt).sort((a,b)=>b[1]-a[1]).map(([s,n],i)=>`
  <div class="bar-row"><span class="lb">${s}</span><div class="bar-tr"><div class="bar-fl" style="width:${n/max*100}%;background:${colors[i%colors.length]}">${n}</div></div></div>`).join('')
  ||'<div class="empty">아직 읽은 기사가 없습니다</div>';
 const top=Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0];
 $('#secInsight').textContent=top?`💡 ${top[0]} 섹션을 가장 많이 읽고 있어요. LEVEL 3 기사에 도전해볼 시점입니다.`:'';
 // 활동 로그
 $('#actList').innerHTML=[
  ...[...state.records].reverse().map(r=>`<div style="padding:8px 0;border-bottom:1px dashed var(--hair)">✍️ <b>${r.week}</b> 기록 완료 — ${ARTICLES[r.art].title}</div>`),
  ...[...state.scrap].map(id=>`<div style="padding:8px 0;border-bottom:1px dashed var(--hair)">⭐ 스크랩 — ${ARTICLES[id].title}</div>`)
 ].join('')||'<div class="empty">활동 내역이 없습니다</div>';
 // 학기말 리포트 문서
 $('#docPreview').innerHTML=`
  <div class="dp-cap en">SEMESTER PORTFOLIO — 2026.1</div>
  <h2>영어 탐구 포트폴리오</h2>
  <div class="dp-sub">${TRACKS.find(t=>t.id===state.track).nm} 계열 · 김민준 · NE Times · 생성일 2026.07.08</div>
  <div class="dp-stat">
    <div><div class="n">${state.read.size}</div><div class="l">읽은 기사</div></div>
    <div><div class="n">${state.records.length}</div><div class="l">완성 기록</div></div>
    <div><div class="n">${state.words.size}</div><div class="l">누적 어휘</div></div>
    <div><div class="n">${state.streak}주</div><div class="l">연속 기록</div></div>
  </div>
  ${state.records.map(r=>{const a=ARTICLES[r.art];return `
  <div class="dp-rec">
    <div class="rh"><span class="wk">${r.week}</span><span class="tt">${a.title}</span><span class="lv l${a.lv}" style="margin-left:auto">LV${a.lv}</span></div>
    <div class="fld" data-l="SUMMARY">${r.s}</div>
    <div class="fld" data-l="OPINION">${r.o}</div>
    <div class="fld" data-l="CAREER LINK">${r.c}</div>
  </div>`}).join('')}
  <div style="font-size:10px;color:var(--gray2);margin-top:20px;border-top:1px solid var(--hair);padding-top:12px">
    본 문서는 학생 활동의 소재·근거 자료이며, 학교생활기록부 기재 자료가 아닙니다. · NE Times English Portfolio
  </div>`;
}

/* 초기 렌더 */
renderGrid();renderPF();renderRP();
<\/script>
</body>
</html>

</script>


<script>
function getDoc(id){
  return document.getElementById(id).textContent.replace(/<\\\/script>/g,'</scr'+'ipt>');
}
const frames=[document.getElementById('fr0'),document.getElementById('fr1'),document.getElementById('fr2')];
const loaded=[false,false,false];
function loadFrame(i){
  if(loaded[i])return;
  frames[i].srcdoc=getDoc('doc'+i);
  loaded[i]=true;
}
function goPage(i){
  loadFrame(i);
  frames.forEach((f,k)=>f.classList.toggle('on',k===i));
  document.querySelectorAll('.sw-tab').forEach((t,k)=>t.classList.toggle('on',k===i));
}
window.goPage=goPage;
// 첫 페이지 즉시 로드, 나머지는 유휴 시간에 미리 로드
loadFrame(0);
frames[0].addEventListener('load',()=>document.getElementById('loading').classList.add('off'),{once:true});
setTimeout(()=>{loadFrame(1);loadFrame(2)},1200);
</script>
</body>
</html>
